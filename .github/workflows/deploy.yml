name: CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  checkout-repo:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  ghrc-login:
    runs-on: self-hosted
    needs: checkout-repo
    steps:
      - name: Login to GHRC
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_ACCESS_TOKEN }}
