name: CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  checkout-repo:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  docker-login:
    runs-on: self-hosted
    needs: checkout-repo
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ secrets.DOCK_USER }}
        password: ${{ secrets.DOCK_ACCESS_KEY }}

  docker-build:
    runs-on: self-hosted
    needs: docker-login
    steps:
    - name: Build a Docker Image
      run: |
       docker build -t ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }}.

 docker-run:
    runs-on: self-hosted
    needs: docker-build
    steps:
    - name: Run Docker Container
      run: |
        docker run -d -p 80:80 ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }}.

  docker-push:
    runs-on: self-hosted
    needs: docker-run
    steps:
    - name: Push Docker Image to GitHub Container Registry
      run: |
        docker push ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }}.
