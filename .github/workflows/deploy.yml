name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${OWNER_LC}/personal-takehome-project:${GITHUB_SHA} \
            -t ghcr.io/${OWNER_LC}/personal-takehome-project:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${OWNER_LC}/personal-takehome-project:${GITHUB_SHA}
          docker push ghcr.io/${OWNER_LC}/personal-takehome-project:latest

      - name: Stop old container
        run: |
          docker rm -f personal-takehome-project || true

      - name: Run container
        run: |
          docker run -d \
            --name personal-takehome-project \
            -p 80:80 \
            ghcr.io/${OWNER_LC}/personal-takehome-project:${GITHUB_SHA}
