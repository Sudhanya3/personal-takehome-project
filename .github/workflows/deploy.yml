name: CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  checkout-repo:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  ghrc-login:
    runs-on: self-hosted
    needs: checkout-repo
    steps:
      - name: Login to GHRC
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_ACCESS_TOKEN }}

  docker-image-push:
    runs-on: self-hosted
    needs: ghrc-login
    steps:
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/personal-takehome-project:${{ github.sha }}.
      - name: Push Docker Image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/personal-takehome-project   :${{ github.sha }}
  docker-run:
    runs-on: self-hosted
    needs: docker-image-push
    steps:
      - name: Pull Docker Image from GHCR
        run: docker pull ghcr.io/${{ github.repository_owner }}/personal-takehome-project:${{ github.sha }}
      - name: Run Docker Container
        run: docker run -d -p 80:80 ghcr.io/${{ github.repository_owner }}/personal-takehome-project:${{ github.sha }}
