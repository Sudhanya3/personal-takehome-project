name: CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  checkout-repo:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCK_USER }}
          password: ${{ secrets.DOCK_PASSWD }}

      - name: Build a Docker Image
        run: |
          docker build -t ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }} .

      - name: Run Docker Container
        run: |
          docker run -d -p 80:80 ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }}.

      - name: Push Docker Image to GitHub Container Registry
        run: |
          docker push ${{ secrets.DOCK_USER }}/personal-takehome-project:${{ github.sha }}.
